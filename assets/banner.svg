<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 150" width="100%" height="100%">
  <style>
    @keyframes pulse-1 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
      50% { transform: translate(30px, -10px) scale(1.05); opacity: 0.45; }
    }
    @keyframes pulse-2 {
      0%, 100% { transform: translate(0, 0) scale(1.05); opacity: 0.2; }
      50% { transform: translate(-20px, 15px) scale(0.95); opacity: 0.35; }
    }
    .glow-1 {
      fill: url(#glow-grad-1);
      animation: pulse-1 8s ease-in-out infinite;
      transform-origin: 200px 75px;
    }
    .glow-2 {
      fill: url(#glow-grad-2);
      animation: pulse-2 10s ease-in-out infinite;
      transform-origin: 600px 75px;
    }
    .title {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 800;
      font-size: 38px;
      fill: #ffffff;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(255,255,255,0.1);
    }
    .subtitle {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 600;
      font-size: 14px;
      fill: #60a5fa;
      letter-spacing: 3px;
    }
    .badge {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 500;
      font-size: 10px;
      fill: #a78bfa;
      letter-spacing: 1px;
    }
  </style>

  <defs>
    <!-- Background Blur Filter -->
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40" />
    </filter>
    
    <!-- Neon glows -->
    <radialGradient id="glow-grad-1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-grad-2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Aurora Glows (softly glowing transparent background) -->
  <g filter="url(#blur)">
    <circle cx="200" cy="75" r="100" class="glow-1" />
    <circle cx="600" cy="75" r="110" class="glow-2" />
  </g>

  <!-- Content Group -->
  <g transform="translate(400, 75)" text-anchor="middle">
    <!-- Subtitle Badge -->
    <rect x="-85" y="-55" width="170" height="22" rx="11" fill="rgba(139, 92, 246, 0.12)" stroke="rgba(139, 92, 246, 0.25)" stroke-width="1" />
    <text y="-40" class="badge">🚀 AI PRODUCT BUILDER</text>

    <!-- Title -->
    <text y="5" class="title">DURVESH MHATRE</text>

    <!-- Subtitle -->
    <text y="42" class="subtitle">BUILDING WITH ANTIGRAVITY • SHIPPING FAST</text>
  </g>
</svg>
