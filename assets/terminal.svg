<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <style>
    .terminal-bg {
      fill: #0b0f19;
      stroke: rgba(255, 255, 255, 0.08);
      stroke-width: 1.5;
    }
    .header-bar {
      fill: #151b2c;
    }
    .header-text {
      fill: #64748b;
      font-family: Menlo, Monaco, Consolas, "Fira Code", monospace;
      font-size: 13px;
      font-weight: 600;
    }
    .term-text {
      font-family: Menlo, Monaco, Consolas, "Fira Code", monospace;
      font-size: 14px;
      fill: #f8fafc;
      letter-spacing: 0.5px;
    }
    .prompt {
      fill: #38bdf8;
      font-weight: bold;
    }
    .command {
      fill: #e2e8f0;
    }
    .cursor {
      fill: #38bdf8;
      animation: cursor-pulse 0.8s infinite;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes cursor-pulse {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    
    .line {
      opacity: 0;
      animation: fadeIn 0.4s ease-out forwards;
    }
    
    .line-1 { animation-delay: 0.3s; }
    .line-2 { animation-delay: 1.0s; }
    .line-3 { animation-delay: 1.8s; }
    .line-4 { animation-delay: 2.6s; }
    .line-5 { animation-delay: 3.4s; }
    .line-6 { animation-delay: 4.2s; }
    .line-7 { animation-delay: 5.0s; }
    .line-8 { animation-delay: 5.8s; }
    .line-9 { animation-delay: 6.6s; }
  </style>

  <!-- Terminal Container -->
  <rect width="800" height="350" rx="12" class="terminal-bg" />

  <!-- Header Bar -->
  <path d="M0,12 A12,12 0 0,1 12,0 H788 A12,12 0 0,1 800,12 V38 H0 Z" class="header-bar" />

  <!-- Window Buttons -->
  <circle cx="20" cy="19" r="6" fill="#ef4444" />
  <circle cx="40" cy="19" r="6" fill="#eab308" />
  <circle cx="60" cy="19" r="6" fill="#22c55e" />

  <!-- Header Window Title -->
  <text x="400" y="24" text-anchor="middle" class="header-text">durvesh@antigravity:~</text>

  <!-- Terminal Content -->
  <g class="term-text" transform="translate(25, 75)">
    <!-- Line 1: Command 1 -->
    <g class="line line-1">
      <text x="0" y="0"><tspan class="prompt">durvesh@antigravity:~$</tspan> <tspan class="command">boot --workspace</tspan></text>
    </g>
    
    <!-- Line 2: Loading logs -->
    <g class="line line-2">
      <text x="0" y="28" fill="#64748b">[system] Booting profile environment...</text>
    </g>
    
    <!-- Line 3: Loading IDE -->
    <g class="line line-3">
      <text x="0" y="56" fill="#64748b">[system] Initializing Antigravity AI IDE...</text>
    </g>
    
    <!-- Line 4: Syncing AI models -->
    <g class="line line-4">
      <text x="0" y="84" fill="#64748b">[system] Establishing neural tunnels to Claude, Gemini &amp; GPT...</text>
    </g>
    
    <!-- Line 5: System success -->
    <g class="line line-5">
      <text x="0" y="112" fill="#22c55e">✓ Workspace loaded. Coffee level at MAX ☕</text>
    </g>
    
    <!-- Line 6: Command 2 -->
    <g class="line line-6">
      <text x="0" y="148"><tspan class="prompt">durvesh@antigravity:~$</tspan> <tspan class="command">whoami</tspan></text>
    </g>
    
    <!-- Line 7: Identity details -->
    <g class="line line-7">
      <text x="0" y="176" fill="#e2e8f0">Durvesh Mhatre | AI Product Builder | Indie Hacker</text>
    </g>
    
    <!-- Line 8: Command 3 -->
    <g class="line line-8">
      <text x="0" y="212"><tspan class="prompt">durvesh@antigravity:~$</tspan> <tspan class="command">status</tspan></text>
    </g>

    <!-- Line 9: Status details & cursor -->
    <g class="line line-9">
      <text x="0" y="240" fill="#a78bfa">Active &amp; shipping products... <tspan fill="#38bdf8">⚡</tspan></text>
      <rect x="272" y="226" width="8" height="15" class="cursor" />
    </g>
  </g>
</svg>
